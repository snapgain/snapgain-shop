<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - SnapGain</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-foreground: #ffffff;
      --background: #ffffff;
      --foreground: #0f172a;
      --muted: #f1f5f9;
      --muted-foreground: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    .icon-wrapper {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }

    .offline-icon {
      width: 64px;
      height: 64px;
      color: var(--muted-foreground);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--foreground);
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      color: var(--muted-foreground);
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background-color: var(--primary);
      color: var(--primary-foreground);
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background-color: var(--muted);
      border-radius: 20px;
      font-size: 14px;
      color: var(--muted-foreground);
      margin-top: 40px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #ef4444;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="offline-icon">
        <path d="M1 1l22 22"></path>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <path d="M12 20h.01"></path>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network settings and try again.</p>
    
    <button onclick="window.location.reload()" class="btn">
      Try Reconnecting
    </button>

    <div class="status-badge">
      <div class="dot"></div>
      Offline Mode
    </div>
  </div>

  <script>
    // Check connection status automatically
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
